<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenacierge 데이터 조회</title>
    <meta name="description" content="간단한 데이터 조회 API 결과를 확인하는 페이지입니다." />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="data-page">
    <header class="data-topbar">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true">T</span>
        <span>홈으로</span>
      </a>
    </header>

    <main class="data-shell">
      <section class="data-panel">
        <p class="eyebrow">DATA API</p>
        <h1>데이터 조회</h1>
        <p>서버의 <code>/api/data</code> 엔드포인트에서 조회한 결과를 표시합니다.</p>
        <div id="data-results" class="data-results" aria-live="polite"></div>
      </section>
    </main>

    <script src="data.js"></script>
  </body>
</html>
